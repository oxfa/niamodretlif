name: Trusted Automation Batch

on:
  workflow_call:
    inputs:
      config_name:
        required: true
        type: string
      config_path:
        required: true
        type: string
      worker_count:
        required: true
        type: number
      worker_log_level:
        required: false
        type: string
        default: debug
      aggregate_log_level:
        required: false
        type: string
        default: debug

permissions: {}

env:
  PYTHONPATH: src

jobs:
  prepare_run:
    name: Validate settings and prepare batch
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      max_parallel_workers: ${{ steps.validate.outputs.max_parallel_workers }}
      worker_ids_json: ${{ steps.validate.outputs.worker_ids_json }}
      worker_runtime_budget_seconds: ${{ steps.validate.outputs.worker_runtime_budget_seconds }}
      target_branch: ${{ steps.validate.outputs.target_branch }}
      source_sha: ${{ steps.validate.outputs.source_sha }}
      batch_id: ${{ steps.batch.outputs.batch_id }}
    env:
      AUTOMATION_MAX_PARALLEL_WORKERS: ${{ vars.AUTOMATION_MAX_PARALLEL_WORKERS }}
      AUTOMATION_TARGET_BRANCH: ${{ vars.AUTOMATION_TARGET_BRANCH }}
      PIPELINE_MAX_RUNTIME_SECONDS: ${{ vars.PIPELINE_MAX_RUNTIME_SECONDS }}
      GEO_IPINFO_TOKEN: ${{ secrets.GEO_IPINFO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate settings
        id: validate
        run: |
          set -eo pipefail
          {
            echo "=== Validate settings ==="
            python -m domain_pipeline.automation.cli validate-run-settings \
              --worker-count "${{ inputs.worker_count }}" \
              --max-parallel-workers "${AUTOMATION_MAX_PARALLEL_WORKERS:-}" \
              --worker-runtime-seconds "${PIPELINE_MAX_RUNTIME_SECONDS:-}" \
              | tee settings.json
          } 2>&1 | tee validate-settings.log
          echo "max_parallel_workers=$(jq -r '.max_parallel_workers' settings.json)" >> "$GITHUB_OUTPUT"
          echo "worker_ids_json=$(jq -c '.worker_ids' settings.json)" >> "$GITHUB_OUTPUT"
          echo "worker_runtime_budget_seconds=$(jq -r '.worker_runtime_budget_seconds' settings.json)" >> "$GITHUB_OUTPUT"
          # Default publishes go to main; the repository variable can override it.
          echo "target_branch=${AUTOMATION_TARGET_BRANCH:-main}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Stage validation artifact
        run: |
          set -eo pipefail
          mkdir -p .debug_artifacts/prepare/validation/logs
          cp settings.json .debug_artifacts/prepare/validation/logs/settings.json
          cp validate-settings.log .debug_artifacts/prepare/validation/logs/validate-settings.log
      - name: Upload validation artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-settings
          path: .debug_artifacts/prepare/validation
          include-hidden-files: true
          if-no-files-found: error
      - name: Build committed batch state
        id: batch
        run: |
          set -eo pipefail
          {
            echo "=== Build committed batch state ==="
            python -m domain_pipeline.automation.cli orchestrate \
              --source-root . \
              --state-root . \
              --config "${{ inputs.config_path }}" \
              --run-id "${GITHUB_RUN_ID}" \
              --run-attempt "${GITHUB_RUN_ATTEMPT}" \
              --worker-count "${{ inputs.worker_count }}" \
              | tee batch.json
          } 2>&1 | tee prepare-batch.log
          echo "batch_id=$(jq -r '.batch_id' batch.json)" >> "$GITHUB_OUTPUT"
      - name: Stage prepared batch artifact
        run: |
          set -eo pipefail
          mkdir -p .tmp/prepared_batch/.workflow_state/batches
          cp -R \
            ".workflow_state/batches/${{ steps.batch.outputs.batch_id }}" \
            .tmp/prepared_batch/.workflow_state/batches/
      - name: Upload prepared batch artifact
        uses: actions/upload-artifact@v7
        with:
          name: prepared-batch
          path: .tmp/prepared_batch
          include-hidden-files: true
          if-no-files-found: error
      - name: Stage prepared batch debug artifact
        run: |
          set -eo pipefail
          mkdir -p .debug_artifacts/prepare/batch/logs
          cp batch.json .debug_artifacts/prepare/batch/logs/batch.json
          cp prepare-batch.log .debug_artifacts/prepare/batch/logs/prepare-batch.log
      - name: Upload prepared batch debug artifact
        uses: actions/upload-artifact@v7
        with:
          name: prepared-batch-debug
          path: .debug_artifacts/prepare/batch
          include-hidden-files: true
          if-no-files-found: error

  run_workers:
    name: Run workers
    needs:
      - prepare_run
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare_run.outputs.max_parallel_workers) }}
      matrix:
        worker_id: ${{ fromJSON(needs.prepare_run.outputs.worker_ids_json) }}
    env:
      GEO_IPINFO_TOKEN: ${{ secrets.GEO_IPINFO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore baseline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .workflow_state/runtime/cache/check-cache.sqlite3
            .workflow_state/runtime/cache/check-cache.sqlite3-shm
            .workflow_state/runtime/cache/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            signal-light-sqlite-${{ inputs.config_name }}-
      - name: Download prepared batch artifact
        uses: actions/download-artifact@v8
        with:
          name: prepared-batch
          path: .tmp/prepared_batch
      - name: Restore prepared batch state
        run: |
          set -eo pipefail
          mkdir -p .workflow_state
          cp -R .tmp/prepared_batch/.workflow_state/. .workflow_state/
      - name: Initialize worker statuses
        id: init
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli initialize-worker-statuses \
            --source-root . \
            --state-root . \
            --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            | tee init.json
          echo "participates=$(jq -r '.participates' init.json)" >> "$GITHUB_OUTPUT"
      - name: Process worker assignment
        id: process
        if: ${{ steps.init.outputs.participates == 'true' }}
        continue-on-error: true
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli worker \
            --source-root . \
            --state-root . \
            --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            --log-level "${{ inputs.worker_log_level }}" \
            --max-runtime-seconds "${{ needs.prepare_run.outputs.worker_runtime_budget_seconds }}" \
            | tee worker.json
          echo "overall_conclusion=$(jq -r '.overall_conclusion' worker.json)" >> "$GITHUB_OUTPUT"
      - name: Finalize successful worker statuses
        if: ${{ steps.init.outputs.participates == 'true' && steps.process.outcome == 'success' }}
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli finalize-worker-statuses \
            --source-root . \
            --state-root . \
            --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            --output-commit-sha "" \
            --push-retry-count 0
      - name: Finalize failure worker statuses
        if: ${{ steps.init.outputs.participates == 'true' && steps.process.outcome != 'success' }}
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli finalize-worker-statuses \
            --source-root . \
            --state-root . \
            --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            --output-commit-sha "" \
            --push-retry-count 0 \
            --fallback-conclusion failure \
            --fallback-failure-reason "worker job failed before terminal statuses were written"
      - name: Stage worker artifact
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        run: |
          set -eo pipefail
          rm -rf .tmp/worker_bundle
          if [ -d ".workflow_state/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}" ]; then
            mkdir -p ".tmp/worker_bundle/.workflow_state/workers/${{ needs.prepare_run.outputs.batch_id }}"
            cp -R \
              ".workflow_state/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}" \
              ".tmp/worker_bundle/.workflow_state/workers/${{ needs.prepare_run.outputs.batch_id }}/"
          fi
          if [ -f ".workflow_state/status/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}.json" ]; then
            mkdir -p ".tmp/worker_bundle/.workflow_state/status/${{ needs.prepare_run.outputs.batch_id }}"
            cp \
              ".workflow_state/status/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}.json" \
              ".tmp/worker_bundle/.workflow_state/status/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}.json"
          fi
      - name: Upload worker artifact
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: worker-${{ matrix.worker_id }}
          path: .tmp/worker_bundle
          include-hidden-files: true
          if-no-files-found: error
      - name: Stage worker debug artifact
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        run: |
          set -eo pipefail
          rm -rf .tmp/worker_debug_bundle
          if [ -f ".debug_artifacts/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}/logs/worker.log" ]; then
            mkdir -p ".tmp/worker_debug_bundle/.debug_artifacts/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}/logs"
            cp \
              ".debug_artifacts/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}/logs/worker.log" \
              ".tmp/worker_debug_bundle/.debug_artifacts/workers/${{ needs.prepare_run.outputs.batch_id }}/${{ matrix.worker_id }}/logs/worker.log"
          fi
      - name: Upload worker debug artifact
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: worker-debug-${{ matrix.worker_id }}
          path: .tmp/worker_debug_bundle
          include-hidden-files: true
          if-no-files-found: error
      - name: Fail worker when processing reported failure
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        run: |
          set -eo pipefail
          if [ "${{ steps.process.outputs.overall_conclusion }}" != "success" ]; then
            echo "${{ matrix.worker_id }} reported terminal failure"
            exit 1
          fi

  aggregate_and_publish:
    name: Aggregate and publish
    if: ${{ always() && needs.prepare_run.result == 'success' }}
    needs:
      - prepare_run
      - run_workers
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: read
    env:
      AUTOMATION_PUSH_TOKEN: ${{ secrets.AUTOMATION_PUSH_TOKEN }}
      AGGREGATE_LOG_PATH: .debug_artifacts/runtime/logs/${{ inputs.config_name }}--aggregate.log
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set privileged remote when configured
        if: ${{ env.AUTOMATION_PUSH_TOKEN != '' }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${AUTOMATION_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare automation worktree
        run: |
          set -eo pipefail
          # This is a local temporary worktree path, not the Git branch name.
          python -m domain_pipeline.automation.cli prepare-automation-worktree \
            --source-root . \
            --state-root . \
            --target-branch "${{ needs.prepare_run.outputs.target_branch }}" \
            --base-ref "${{ needs.prepare_run.outputs.source_sha }}"
      - name: Restore aggregate baseline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .workflow_state/runtime/cache/check-cache.sqlite3
            .workflow_state/runtime/cache/check-cache.sqlite3-shm
            .workflow_state/runtime/cache/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            signal-light-sqlite-${{ inputs.config_name }}-
      - name: Configure git actor
        run: |
          python -m domain_pipeline.automation.cli configure-git \
            --source-root . \
            --state-root .
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: .tmp/downloads
      - name: Restore prepared and worker state
        run: |
          set -eo pipefail
          mkdir -p .workflow_state
          cp -R \
            ".tmp/downloads/prepared-batch/.workflow_state/." \
            .workflow_state/
          for worker_dir in .tmp/downloads/worker-*; do
            [ -d "${worker_dir}" ] || continue
            if [ -d "${worker_dir}/.workflow_state/workers" ]; then
              mkdir -p .workflow_state/workers
              cp -R "${worker_dir}/.workflow_state/workers/." .workflow_state/workers/
            fi
            if [ -d "${worker_dir}/.workflow_state/status" ]; then
              mkdir -p .workflow_state/status
              cp -R "${worker_dir}/.workflow_state/status/." .workflow_state/status/
            fi
          done
      - name: Initialize aggregate job log
        run: |
          set -eo pipefail
          mkdir -p "$(dirname "${AGGREGATE_LOG_PATH}")"
          : > "${AGGREGATE_LOG_PATH}"
          {
            echo "aggregate job log initialized for config=${{ inputs.config_name }}"
            echo "batch_id=${{ needs.prepare_run.outputs.batch_id }}"
            echo "target_branch=${{ needs.prepare_run.outputs.target_branch }}"
          } | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Materialize incomplete worker statuses
        run: |
          set -eo pipefail
          {
            echo "=== Materialize incomplete worker statuses ==="
            python -m domain_pipeline.automation.cli materialize-incomplete-statuses \
              --source-root . \
              --state-root . \
              --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
              --failure-reason "aggregate detected missing or incomplete worker artifacts" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee materialize.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Validate aggregate barrier
        id: readiness
        run: |
          set -eo pipefail
          {
            echo "=== Validate aggregate barrier ==="
            python -m domain_pipeline.automation.cli validate-aggregate \
              --source-root . \
              --state-root . \
              --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee readiness.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "state=$(jq -r '.state' readiness.json)" >> "$GITHUB_OUTPUT"
      - name: Aggregate batch outputs
        if: ${{ steps.readiness.outputs.state == 'ready_success' || steps.readiness.outputs.state == 'ready_failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Aggregate batch outputs ==="
            python -m domain_pipeline.automation.cli aggregate \
              --source-root . \
              --state-root . \
              --batch-id "${{ needs.prepare_run.outputs.batch_id }}" \
              --target-ref "${{ needs.prepare_run.outputs.target_branch }}" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee aggregate.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Export aggregate state
        if: ${{ steps.readiness.outputs.state == 'ready_success' || steps.readiness.outputs.state == 'ready_failed' }}
        id: aggregate_state
        run: |
          echo "state=$(jq -r '.state' aggregate.json)" >> "$GITHUB_OUTPUT"
      - name: Export config name
        id: config
        run: |
          echo "config_name=${{ inputs.config_name }}" >> "$GITHUB_OUTPUT"
      - name: Stage aggregate log artifact
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          rm -rf .debug_artifacts/upload_bundle
          mkdir -p ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/validation-settings/logs"
          mkdir -p ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/prepared-batch/logs"
          mkdir -p ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/jsonl-log"
          mkdir -p ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/runtime-logs"
          mkdir -p ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/worker-logs"
          cp .tmp/downloads/validation-settings/.debug_artifacts/prepare/validation/logs/settings.json \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/validation-settings/logs/settings.json"
          cp .tmp/downloads/validation-settings/.debug_artifacts/prepare/validation/logs/validate-settings.log \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/validation-settings/logs/validate-settings.log"
          cp .tmp/downloads/prepared-batch-debug/.debug_artifacts/prepare/batch/logs/batch.json \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/prepared-batch/logs/batch.json"
          cp .tmp/downloads/prepared-batch-debug/.debug_artifacts/prepare/batch/logs/prepare-batch.log \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/prepared-batch/logs/prepare-batch.log"
          cp \
            ".debug_artifacts/runtime/raw/${{ steps.config.outputs.config_name }}.jsonl" \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/jsonl-log/${{ steps.config.outputs.config_name }}.jsonl"
          cp \
            ".debug_artifacts/runtime/logs/${{ steps.config.outputs.config_name }}.log" \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/runtime-logs/${{ steps.config.outputs.config_name }}.log"
          cp \
            ".debug_artifacts/runtime/logs/${{ steps.config.outputs.config_name }}--aggregate.log" \
            ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/runtime-logs/${{ steps.config.outputs.config_name }}--aggregate.log"
          for worker_dir in .tmp/downloads/worker-debug-*; do
            [ -d "${worker_dir}" ] || continue
            artifact_name="${worker_dir##*/}"
            worker_id="${artifact_name#worker-debug-}"
            worker_log_path="${worker_dir}/.debug_artifacts/workers/${{ needs.prepare_run.outputs.batch_id }}/${worker_id}/logs/worker.log"
            [ -f "${worker_log_path}" ] || continue
            cp "${worker_log_path}" ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/worker-logs/${worker_id}.log"
          done
          echo "=== Aggregate artifact staging complete ===" | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Save aggregate baseline cache
        if: ${{ (steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed') && hashFiles('.workflow_state/runtime/cache/check-cache.sqlite3') != '' }}
        uses: actions/cache/save@v5
        with:
          path: |
            .workflow_state/runtime/cache/check-cache.sqlite3
            .workflow_state/runtime/cache/check-cache.sqlite3-shm
            .workflow_state/runtime/cache/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Remove workflow-local automation state before publish
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          # The publish worktree contains only branch-facing output paths.
          # Workflow-internal state and debug artifacts live outside it under
          # `.workflow_state/` and `.debug_artifacts/`.
      - name: Commit failed aggregate cleanup
        if: ${{ steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Commit failed aggregate cleanup ==="
            python -m domain_pipeline.automation.cli commit-paths \
              --source-root . \
              --state-root . \
              --message "automation(${{ needs.prepare_run.outputs.batch_id }}): aggregate failed" \
              --log-level "${{ inputs.aggregate_log_level }}"
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Validate publish candidate sizes
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' }}
        run: |
          set -eo pipefail
          {
            echo "=== Validate publish candidate sizes ==="
            python -m domain_pipeline.automation.cli validate-publish-candidate-sizes \
              --source-root . \
              --state-root . \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --path "$(jq -r '.final_output_paths.filtered' aggregate.json)" \
              --path "$(jq -r '.final_output_paths.dead' aggregate.json)" \
              --path "$(jq -r '.final_output_paths.review' aggregate.json)" \
              | tee publish-size-check.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "=== Publish-size validation complete ===" | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Commit aggregate outputs
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' }}
        id: aggregate_commit
        run: |
          set -eo pipefail
          {
            echo "=== Commit aggregate outputs ==="
            python -m domain_pipeline.automation.cli commit-paths \
              --source-root . \
              --state-root . \
              --message "automation(${{ needs.prepare_run.outputs.batch_id }}): aggregate outputs" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --path "$(jq -r '.final_output_paths.filtered' aggregate.json)" \
              --path "$(jq -r '.final_output_paths.dead' aggregate.json)" \
              --path "$(jq -r '.final_output_paths.review' aggregate.json)" \
              | tee aggregate-commit.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "commit_sha=$(jq -r '.commit_sha // empty' aggregate-commit.json)" >> "$GITHUB_OUTPUT"
          echo "=== Aggregate commit metadata captured ===" | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Push published state
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Push published state ==="
            python -m domain_pipeline.automation.cli push-branch \
              --source-root . \
              --state-root . \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --branch "${{ needs.prepare_run.outputs.target_branch }}" \
              --max-retries 2
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "=== Push published state complete ===" | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Log aggregate artifact upload intent
        if: ${{ always() && (steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed') }}
        run: |
          set -eo pipefail
          echo "=== Upload aggregate log artifact ===" | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Refresh staged aggregate job log
        if: ${{ always() && (steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed') }}
        run: |
          set -eo pipefail
          # After publish cleanup, AGGREGATE_LOG_PATH contains the recreated
          # post-cleanup segment only, so append it into the staged pre-cleanup log.
          cat "${AGGREGATE_LOG_PATH}" >> ".debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}/runtime-logs/${{ steps.config.outputs.config_name }}--aggregate.log"
      - name: Upload aggregate log artifact
        if: ${{ always() && (steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed') }}
        uses: actions/upload-artifact@v7
        with:
          name: automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}
          path: .debug_artifacts/upload_bundle/automation-log-${{ inputs.config_name }}-${{ needs.prepare_run.outputs.batch_id }}
          if-no-files-found: ignore
      - name: Fail failed aggregate runs
        if: ${{ steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          echo "aggregate marked batch ${{ needs.prepare_run.outputs.batch_id }} as failed"
          exit 1
      - name: Fail unexpected aggregate readiness
        if: ${{ steps.readiness.outputs.state != 'ready_success' && steps.readiness.outputs.state != 'ready_failed' }}
        run: |
          echo "unexpected aggregate readiness: ${{ steps.readiness.outputs.state }}"
          exit 1
