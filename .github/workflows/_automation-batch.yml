name: Trusted Automation Batch

on:
  workflow_call:
    inputs:
      config_name:
        required: true
        type: string
      config_path:
        required: true
        type: string
      worker_count:
        required: true
        type: number
      worker_log_level:
        required: false
        type: string
        default: debug
      aggregate_log_level:
        required: false
        type: string
        default: debug

permissions: {}

env:
  PYTHONPATH: src

jobs:
  validate_settings:
    name: Validate automation settings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      max_parallel_workers: ${{ steps.validate.outputs.max_parallel_workers }}
      worker_ids_json: ${{ steps.validate.outputs.worker_ids_json }}
      worker_runtime_budget_seconds: ${{ steps.validate.outputs.worker_runtime_budget_seconds }}
      target_branch: ${{ steps.validate.outputs.target_branch }}
      source_sha: ${{ steps.validate.outputs.source_sha }}
    env:
      AUTOMATION_MAX_PARALLEL_WORKERS: ${{ vars.AUTOMATION_MAX_PARALLEL_WORKERS }}
      AUTOMATION_TARGET_BRANCH: ${{ vars.AUTOMATION_TARGET_BRANCH }}
      PIPELINE_MAX_RUNTIME_SECONDS: ${{ vars.PIPELINE_MAX_RUNTIME_SECONDS }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Validate settings
        id: validate
        run: |
          set -eo pipefail
          {
            echo "=== Validate settings ==="
            python -m domain_pipeline.automation.cli validate-run-settings \
              --worker-count "${{ inputs.worker_count }}" \
              --max-parallel-workers "${AUTOMATION_MAX_PARALLEL_WORKERS:-}" \
              --worker-runtime-seconds "${PIPELINE_MAX_RUNTIME_SECONDS:-}" \
              | tee settings.json
          } 2>&1 | tee validate-settings.log
          echo "max_parallel_workers=$(jq -r '.max_parallel_workers' settings.json)" >> "$GITHUB_OUTPUT"
          echo "worker_ids_json=$(jq -c '.worker_ids' settings.json)" >> "$GITHUB_OUTPUT"
          echo "worker_runtime_budget_seconds=$(jq -r '.worker_runtime_budget_seconds' settings.json)" >> "$GITHUB_OUTPUT"
          # Default publishes go to main; the repository variable can override it.
          echo "target_branch=${AUTOMATION_TARGET_BRANCH:-main}" >> "$GITHUB_OUTPUT"
          echo "source_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Stage validation artifact
        run: |
          set -eo pipefail
          mkdir -p .tmp/validation_artifact/logs
          cp settings.json .tmp/validation_artifact/logs/settings.json
          cp validate-settings.log .tmp/validation_artifact/logs/validate-settings.log
      - name: Upload validation artifact
        uses: actions/upload-artifact@v7
        with:
          name: validation-settings
          path: .tmp/validation_artifact
          include-hidden-files: true
          if-no-files-found: error

  prepare_batch:
    name: Prepare batch
    needs: validate_settings
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GEO_IPINFO_TOKEN: ${{ secrets.GEO_IPINFO_TOKEN }}
    outputs:
      batch_id: ${{ steps.batch.outputs.batch_id }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build committed batch state
        id: batch
        run: |
          set -eo pipefail
          {
            echo "=== Build committed batch state ==="
            python -m domain_pipeline.automation.cli orchestrate \
              --source-root . \
              --state-root .tmp/automation_state \
              --config "${{ inputs.config_path }}" \
              --target-ref "${{ needs.validate_settings.outputs.target_branch }}" \
              --source-sha "${{ needs.validate_settings.outputs.source_sha }}" \
              --run-id "${GITHUB_RUN_ID}" \
              --run-attempt "${GITHUB_RUN_ATTEMPT}" \
              --worker-count "${{ inputs.worker_count }}" \
              --worker-runtime-budget-seconds "${{ needs.validate_settings.outputs.worker_runtime_budget_seconds }}" \
              | tee batch.json
          } 2>&1 | tee prepare-batch.log
          echo "batch_id=$(jq -r '.batch_id' batch.json)" >> "$GITHUB_OUTPUT"
      - name: Stage prepared batch artifact
        run: |
          set -eo pipefail
          mkdir -p .tmp/prepared_batch/.automation/batches
          mkdir -p .tmp/prepared_batch/logs
          cp -R \
            ".tmp/automation_state/.automation/batches/${{ steps.batch.outputs.batch_id }}" \
            .tmp/prepared_batch/.automation/batches/
          cp batch.json .tmp/prepared_batch/logs/batch.json
          cp prepare-batch.log .tmp/prepared_batch/logs/prepare-batch.log
      - name: Upload prepared batch artifact
        uses: actions/upload-artifact@v7
        with:
          name: prepared-batch
          path: .tmp/prepared_batch
          include-hidden-files: true
          if-no-files-found: error

  run_workers:
    name: Run workers
    needs:
      - validate_settings
      - prepare_batch
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.validate_settings.outputs.max_parallel_workers) }}
      matrix:
        worker_id: ${{ fromJSON(needs.validate_settings.outputs.worker_ids_json) }}
    env:
      GEO_IPINFO_TOKEN: ${{ secrets.GEO_IPINFO_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Restore baseline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .tmp/runtime/check-cache.sqlite3
            .tmp/runtime/check-cache.sqlite3-shm
            .tmp/runtime/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            signal-light-sqlite-${{ inputs.config_name }}-
      - name: Download prepared batch artifact
        uses: actions/download-artifact@v8
        with:
          name: prepared-batch
          path: .tmp/prepared_batch
      - name: Restore prepared batch state
        run: |
          set -eo pipefail
          mkdir -p .tmp/automation_state
          cp -R .tmp/prepared_batch/. .tmp/automation_state/
      - name: Initialize worker statuses
        id: init
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli initialize-worker-statuses \
            --source-root . \
            --state-root .tmp/automation_state \
            --batch-id "${{ needs.prepare_batch.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            --metadata-path .tmp/worker-metadata.json \
            | tee init.json
          echo "participates=$(jq -r '.participates' .tmp/worker-metadata.json)" >> "$GITHUB_OUTPUT"
      - name: Process worker assignment
        id: process
        if: ${{ steps.init.outputs.participates == 'true' }}
        continue-on-error: true
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli worker \
            --source-root . \
            --state-root .tmp/automation_state \
            --batch-id "${{ needs.prepare_batch.outputs.batch_id }}" \
            --worker-id "${{ matrix.worker_id }}" \
            --metadata-output .tmp/worker-metadata.json \
            --log-level "${{ inputs.worker_log_level }}" \
            --max-runtime-seconds "${{ needs.validate_settings.outputs.worker_runtime_budget_seconds }}" \
            | tee worker.json
      - name: Finalize successful worker statuses
        if: ${{ steps.init.outputs.participates == 'true' && steps.process.outcome == 'success' }}
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli finalize-worker-statuses \
            --source-root . \
            --state-root .tmp/automation_state \
            --metadata-path .tmp/worker-metadata.json \
            --output-commit-sha "" \
            --push-retry-count 0
      - name: Finalize failure worker statuses
        if: ${{ steps.init.outputs.participates == 'true' && steps.process.outcome != 'success' }}
        run: |
          set -eo pipefail
          python -m domain_pipeline.automation.cli finalize-worker-statuses \
            --source-root . \
            --state-root .tmp/automation_state \
            --metadata-path .tmp/worker-metadata.json \
            --output-commit-sha "" \
            --push-retry-count 0 \
            --fallback-conclusion failure \
            --fallback-failure-reason "worker job failed before terminal statuses were written"
      - name: Stage worker artifact
        if: ${{ always() }}
        run: |
          set -eo pipefail
          rm -rf .tmp/worker_bundle
          mkdir -p .tmp/worker_bundle/metadata
          cp .tmp/worker-metadata.json ".tmp/worker_bundle/metadata/${{ matrix.worker_id }}.json"
          if [ -d ".tmp/automation_state/.automation/results/${{ needs.prepare_batch.outputs.batch_id }}/${{ matrix.worker_id }}" ]; then
            mkdir -p ".tmp/worker_bundle/.automation/results/${{ needs.prepare_batch.outputs.batch_id }}"
            cp -R \
              ".tmp/automation_state/.automation/results/${{ needs.prepare_batch.outputs.batch_id }}/${{ matrix.worker_id }}" \
              ".tmp/worker_bundle/.automation/results/${{ needs.prepare_batch.outputs.batch_id }}/"
          fi
          if [ -f ".tmp/automation_state/.automation/status/${{ needs.prepare_batch.outputs.batch_id }}/${{ matrix.worker_id }}.json" ]; then
            mkdir -p ".tmp/worker_bundle/.automation/status/${{ needs.prepare_batch.outputs.batch_id }}"
            cp \
              ".tmp/automation_state/.automation/status/${{ needs.prepare_batch.outputs.batch_id }}/${{ matrix.worker_id }}.json" \
              ".tmp/worker_bundle/.automation/status/${{ needs.prepare_batch.outputs.batch_id }}/${{ matrix.worker_id }}.json"
          fi
      - name: Upload worker artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: worker-${{ matrix.worker_id }}
          path: .tmp/worker_bundle
          include-hidden-files: true
          if-no-files-found: error
      - name: Fail worker when processing reported failure
        if: ${{ always() && steps.init.outputs.participates == 'true' }}
        run: |
          set -eo pipefail
          if [ "$(jq -r '.overall_conclusion' .tmp/worker-metadata.json)" != "success" ]; then
            echo "${{ matrix.worker_id }} reported terminal failure"
            exit 1
          fi

  aggregate_and_publish:
    name: Aggregate and publish
    if: ${{ always() && needs.validate_settings.result == 'success' && needs.prepare_batch.result == 'success' }}
    needs:
      - validate_settings
      - prepare_batch
      - run_workers
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: read
    env:
      AUTOMATION_PUSH_TOKEN: ${{ secrets.AUTOMATION_PUSH_TOKEN }}
      AGGREGATE_LOG_PATH: .tmp/automation_worktree/.tmp/runtime/logs/${{ inputs.config_name }}--aggregate.log
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set privileged remote when configured
        if: ${{ env.AUTOMATION_PUSH_TOKEN != '' }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${AUTOMATION_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Prepare automation worktree
        run: |
          set -eo pipefail
          # This is a local temporary worktree path, not the Git branch name.
          python -m domain_pipeline.automation.cli prepare-automation-worktree \
            --source-root . \
            --state-root .tmp/automation_worktree \
            --target-branch "${{ needs.validate_settings.outputs.target_branch }}" \
            --base-ref "${{ needs.validate_settings.outputs.source_sha }}"
      - name: Restore aggregate baseline cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .tmp/runtime/check-cache.sqlite3
            .tmp/runtime/check-cache.sqlite3-shm
            .tmp/runtime/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            signal-light-sqlite-${{ inputs.config_name }}-
      - name: Hydrate aggregate baseline cache into worktree
        run: |
          set -eo pipefail
          # Actions cache restore/save stays anchored at repo-root paths.
          # Aggregate runtime still merges into the dedicated worktree cache path.
          mkdir -p .tmp/automation_worktree/.tmp/runtime
          if [ -f .tmp/runtime/check-cache.sqlite3 ]; then
            cp .tmp/runtime/check-cache.sqlite3 \
              .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3
            if [ -f .tmp/runtime/check-cache.sqlite3-shm ]; then
              cp .tmp/runtime/check-cache.sqlite3-shm \
                .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-shm
            else
              rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-shm
            fi
            if [ -f .tmp/runtime/check-cache.sqlite3-wal ]; then
              cp .tmp/runtime/check-cache.sqlite3-wal \
                .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-wal
            else
              rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-wal
            fi
          else
            rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3
            rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-shm
            rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-wal
          fi
      - name: Configure git actor
        run: |
          python -m domain_pipeline.automation.cli configure-git \
            --source-root . \
            --state-root .tmp/automation_worktree
      - name: Download workflow artifacts
        uses: actions/download-artifact@v8
        with:
          path: .tmp/downloads
      - name: Restore prepared and worker state
        run: |
          set -eo pipefail
          mkdir -p .tmp/automation_worktree/.automation
          cp -R \
            ".tmp/downloads/prepared-batch/.automation/batches" \
            .tmp/automation_worktree/.automation/
          for worker_dir in .tmp/downloads/worker-*; do
            [ -d "${worker_dir}" ] || continue
            if [ -d "${worker_dir}/.automation/results" ]; then
              mkdir -p .tmp/automation_worktree/.automation/results
              cp -R "${worker_dir}/.automation/results/." .tmp/automation_worktree/.automation/results/
            fi
            if [ -d "${worker_dir}/.automation/status" ]; then
              mkdir -p .tmp/automation_worktree/.automation/status
              cp -R "${worker_dir}/.automation/status/." .tmp/automation_worktree/.automation/status/
            fi
          done
      - name: Initialize aggregate job log
        run: |
          set -eo pipefail
          mkdir -p "$(dirname "${AGGREGATE_LOG_PATH}")"
          : > "${AGGREGATE_LOG_PATH}"
          {
            echo "aggregate job log initialized for config=${{ inputs.config_name }}"
            echo "batch_id=${{ needs.prepare_batch.outputs.batch_id }}"
            echo "target_branch=${{ needs.validate_settings.outputs.target_branch }}"
          } | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Materialize incomplete worker statuses
        run: |
          set -eo pipefail
          {
            echo "=== Materialize incomplete worker statuses ==="
            python -m domain_pipeline.automation.cli materialize-incomplete-statuses \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --batch-id "${{ needs.prepare_batch.outputs.batch_id }}" \
              --failure-reason "aggregate detected missing or incomplete worker artifacts" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee materialize.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Validate aggregate barrier
        id: readiness
        run: |
          set -eo pipefail
          {
            echo "=== Validate aggregate barrier ==="
            python -m domain_pipeline.automation.cli validate-aggregate \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --batch-id "${{ needs.prepare_batch.outputs.batch_id }}" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee readiness.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "state=$(jq -r '.state' readiness.json)" >> "$GITHUB_OUTPUT"
      - name: Aggregate batch outputs
        if: ${{ steps.readiness.outputs.state == 'ready_success' || steps.readiness.outputs.state == 'ready_failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Aggregate batch outputs ==="
            python -m domain_pipeline.automation.cli aggregate \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --batch-id "${{ needs.prepare_batch.outputs.batch_id }}" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              | tee aggregate.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Export aggregate state
        if: ${{ steps.readiness.outputs.state == 'ready_success' || steps.readiness.outputs.state == 'ready_failed' }}
        id: aggregate_state
        run: |
          echo "state=$(jq -r '.state' aggregate.json)" >> "$GITHUB_OUTPUT"
      - name: Export config name
        id: config
        run: |
          echo "config_name=${{ inputs.config_name }}" >> "$GITHUB_OUTPUT"
      - name: Stage aggregate log artifact
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          rm -rf .tmp/aggregate_log_artifact
          # Keep the merged runtime logs and each worker log together for post-run debugging.
          mkdir -p .tmp/aggregate_log_artifact/validation-settings/logs
          mkdir -p .tmp/aggregate_log_artifact/prepared-batch/logs
          mkdir -p .tmp/aggregate_log_artifact/jsonl-log
          mkdir -p .tmp/aggregate_log_artifact/runtime-logs
          mkdir -p .tmp/aggregate_log_artifact/worker-logs
          cp .tmp/downloads/validation-settings/logs/settings.json \
            .tmp/aggregate_log_artifact/validation-settings/logs/settings.json
          cp .tmp/downloads/validation-settings/logs/validate-settings.log \
            .tmp/aggregate_log_artifact/validation-settings/logs/validate-settings.log
          cp .tmp/downloads/prepared-batch/logs/batch.json \
            .tmp/aggregate_log_artifact/prepared-batch/logs/batch.json
          cp .tmp/downloads/prepared-batch/logs/prepare-batch.log \
            .tmp/aggregate_log_artifact/prepared-batch/logs/prepare-batch.log
          cp \
            ".tmp/automation_worktree/output/raw/${{ steps.config.outputs.config_name }}.jsonl" \
            ".tmp/aggregate_log_artifact/jsonl-log/${{ steps.config.outputs.config_name }}.jsonl"
          cp \
            ".tmp/automation_worktree/.tmp/runtime/logs/${{ steps.config.outputs.config_name }}.log" \
            ".tmp/aggregate_log_artifact/runtime-logs/${{ steps.config.outputs.config_name }}.log"
          cp \
            ".tmp/automation_worktree/.tmp/runtime/logs/${{ steps.config.outputs.config_name }}--aggregate.log" \
            ".tmp/aggregate_log_artifact/runtime-logs/${{ steps.config.outputs.config_name }}--aggregate.log"
          for worker_dir in .tmp/downloads/worker-*; do
            [ -d "${worker_dir}" ] || continue
            artifact_name="${worker_dir##*/}"
            worker_id="${artifact_name#worker-}"
            worker_log_path="${worker_dir}/.automation/results/${{ needs.prepare_batch.outputs.batch_id }}/${worker_id}/state/worker.log"
            [ -f "${worker_log_path}" ] || continue
            cp "${worker_log_path}" ".tmp/aggregate_log_artifact/worker-logs/${worker_id}.log"
          done
      - name: Upload aggregate log artifact
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        uses: actions/upload-artifact@v7
        with:
          name: automation-log-${{ inputs.config_name }}-${{ needs.prepare_batch.outputs.batch_id }}
          path: .tmp/aggregate_log_artifact
          if-no-files-found: ignore
      - name: Persist aggregate baseline cache to repo root
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          mkdir -p .tmp/runtime
          if [ -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3 ]; then
            cp .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3 \
              .tmp/runtime/check-cache.sqlite3
            if [ -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-shm ]; then
              cp .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-shm \
                .tmp/runtime/check-cache.sqlite3-shm
            else
              rm -f .tmp/runtime/check-cache.sqlite3-shm
            fi
            if [ -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-wal ]; then
              cp .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3-wal \
                .tmp/runtime/check-cache.sqlite3-wal
            else
              rm -f .tmp/runtime/check-cache.sqlite3-wal
            fi
          fi
      - name: Save aggregate baseline cache
        if: ${{ (steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed') && hashFiles('.tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3') != '' && hashFiles('.tmp/runtime/check-cache.sqlite3') != '' }}
        uses: actions/cache/save@v5
        with:
          path: |
            .tmp/runtime/check-cache.sqlite3
            .tmp/runtime/check-cache.sqlite3-shm
            .tmp/runtime/check-cache.sqlite3-wal
          key: signal-light-sqlite-${{ inputs.config_name }}-${{ github.run_id }}-${{ github.run_attempt }}
      - name: Remove workflow-local automation state before publish
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          # `.automation/` is workflow-local staging state and must not be published.
          # We still stage the path later so any previously tracked copies are deleted.
          # The same applies to legacy tracked state/log surfaces from older publishes.
          rm -rf .tmp/automation_worktree/.automation
          rm -f ".tmp/automation_worktree/output/raw/${{ steps.config.outputs.config_name }}.jsonl"
          rm -f .tmp/automation_worktree/.tmp/runtime/check-cache.sqlite3
          rm -f .tmp/automation_worktree/state/check-cache.sqlite3
          if [ -d .tmp/automation_worktree/.tmp/runtime/logs ]; then
            find .tmp/automation_worktree/.tmp/runtime/logs -maxdepth 1 -type f -name '*.log' -delete
          fi
          if [ -d .tmp/automation_worktree/state/logs ]; then
            find .tmp/automation_worktree/state/logs -maxdepth 1 -type f -name '*.log' -delete
          fi
          if [ -d .tmp/automation_worktree/log ]; then
            find .tmp/automation_worktree/log -maxdepth 1 -type f -name '*.log' -delete
          fi
      - name: Commit failed aggregate cleanup
        if: ${{ steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Commit failed aggregate cleanup ==="
            python -m domain_pipeline.automation.cli commit-paths \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --message "automation(${{ needs.prepare_batch.outputs.batch_id }}): aggregate failed" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --path "state/check-cache.sqlite3" \
              --path "state/logs/*.log" \
              --path "log/*.log" \
              --path ".automation"
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Validate publish candidate sizes
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' }}
        run: |
          set -eo pipefail
          {
            echo "=== Validate publish candidate sizes ==="
            python -m domain_pipeline.automation.cli validate-publish-candidate-sizes \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --path "output/filtered/${{ steps.config.outputs.config_name }}.txt" \
              --path "output/dead/${{ steps.config.outputs.config_name }}.txt" \
              --path "output/review/${{ steps.config.outputs.config_name }}.csv" \
              | tee publish-size-check.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Commit aggregate outputs
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' }}
        id: aggregate_commit
        run: |
          set -eo pipefail
          {
            echo "=== Commit aggregate outputs ==="
            python -m domain_pipeline.automation.cli commit-paths \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --message "automation(${{ needs.prepare_batch.outputs.batch_id }}): aggregate outputs" \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --path "output/filtered/${{ steps.config.outputs.config_name }}.txt" \
              --path "output/dead/${{ steps.config.outputs.config_name }}.txt" \
              --path "output/review/${{ steps.config.outputs.config_name }}.csv" \
              --path "output/raw/${{ steps.config.outputs.config_name }}.jsonl" \
              --path "state/check-cache.sqlite3" \
              --path "state/logs/*.log" \
              --path "log/*.log" \
              --path ".automation" \
              | tee aggregate-commit.json
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
          echo "commit_sha=$(jq -r '.commit_sha // empty' aggregate-commit.json)" >> "$GITHUB_OUTPUT"
      - name: Push published state
        if: ${{ steps.aggregate_state.outputs.state == 'aggregated' || steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          set -eo pipefail
          {
            echo "=== Push published state ==="
            python -m domain_pipeline.automation.cli push-branch \
              --source-root . \
              --state-root .tmp/automation_worktree \
              --log-level "${{ inputs.aggregate_log_level }}" \
              --branch "${{ needs.validate_settings.outputs.target_branch }}" \
              --max-retries 2
          } 2>&1 | tee -a "${AGGREGATE_LOG_PATH}"
      - name: Fail failed aggregate runs
        if: ${{ steps.aggregate_state.outputs.state == 'failed' }}
        run: |
          echo "aggregate marked batch ${{ needs.prepare_batch.outputs.batch_id }} as failed"
          exit 1
      - name: Fail unexpected aggregate readiness
        if: ${{ steps.readiness.outputs.state != 'ready_success' && steps.readiness.outputs.state != 'ready_failed' }}
        run: |
          echo "unexpected aggregate readiness: ${{ steps.readiness.outputs.state }}"
          exit 1
