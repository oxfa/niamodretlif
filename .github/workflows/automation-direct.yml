name: Automation Direct
run-name: automation direct / ${{ github.run_id }}

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

concurrency:
  group: automation-direct
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

# Optional per-config manual files:
# - input/manual_filter_pass/direct.txt
# - input/manual_filter_out/direct.txt
# - input/manual_add/direct.txt
jobs:
  batch:
    uses: ./.github/workflows/_automation-batch.yml
    with:
      config_name: direct
      config_path: config/direct.yaml
      worker_count: 18
    secrets: inherit
