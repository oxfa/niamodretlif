name: Automation Block
run-name: automation block / ${{ github.run_id }}

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

concurrency:
  group: automation-block
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

# Optional per-config manual files:
# - input/manual_filter_pass/block.txt
# - input/manual_filter_out/block.txt
# - input/manual_add/block.txt
jobs:
  batch:
    uses: ./.github/workflows/_automation-batch.yml
    with:
      config_name: block
      config_path: config/block.yaml
      worker_count: 18
    secrets: inherit
