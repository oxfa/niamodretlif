version: 2

defaults:
  fetch:
    request_timeout: 30.0

  rdap:
    timeout: 10.0

  output:
    directory: output

cache:
  classification_ttl_days:
    rdap_registrable_domain_unregistered: 30
    rdap_registrable_domain_registered: 7
    rdap_lookup_unavailable: 7
  dns_ttl_days: 7

sources:
  - id: direct
    enabled: true
    input:
      type: url
      location: https://is.gd/43bKSw
    dns:
      enabled: true
      timeout: 5.0
      ecs:
        enabled: true
        subnet: "140.206.64.0/24"
        scope_prefix_length: 0
    geo:
      enabled: true
      provider: ipinfo_lite
      timeout: 5.0
      cache_ttl_days: 7
      policy:
        enabled: true
        match_scope: any_ip
        include:
          countries:
            - CN
