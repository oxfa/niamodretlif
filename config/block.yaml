version: 2

# Optional per-config manual files:
# - input/manual_filter_pass/block.txt
# - input/manual_filter_out/block.txt
# - input/manual_add/block.txt
# manual_add entries are allowed for this RDAP-only config because they only do
# RDAP. They bypass DNS/geo and never emit dead-output rows.

defaults:
  fetch:
    request_timeout: 30.0

  rdap:
    timeout: 10.0

  output:
    directory: output

cache:
  classification_ttl_days:
    rdap_registrable_domain_unregistered: 30
    rdap_registrable_domain_registered: 7
    rdap_lookup_unavailable: 7
  dns_ttl_days: 7

sources:
  - id: block
    enabled: true
    input:
      type: url
      location: https://is.gd/vQFXgT
    dns:
      enabled: false
    geo:
      enabled: false
